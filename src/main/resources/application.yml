spring:
  application:
    name: SmartNetdisk
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartnetdisk}
  data:
    redis:
      password: ${REDIS_PASSWORD:}
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB
  profiles:
    active: local
server:
#  servlet:
#    context-path: /api
  port: 8081
  tomcat:
    max-http-form-post-size: 10GB
    max-swallow-size: 10GB
    connection-timeout: 60000  # 60秒连接超时，防止大文件传输时断开

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # 移除全局逻辑删除配置，手动管理 deleted 字段以支持回收站功能
      # logic-delete-field: deleted
      # logic-delete-value: 1
      # logic-not-delete-value: 0

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket-name: smartnetdisk

# AI 配置（全部使用阿里云 DashScope）
ai:
  siliconflow:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${AI_MODEL:qwen3.5-plus-2026-02-15}
    # Embedding 使用 DashScope 原生 API（qwen3-vl-embedding 不支持 OpenAI 兼容模式）
    embedding-base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding}
    embedding-model: ${EMBEDDING_MODEL:qwen3-vl-embedding}
    embedding-dimension: 1024

# kkFileView 配置
kkfileview:
  base-url: ${KKFILEVIEW_BASE_URL:https://kkfile.abcsummer.site}

# Sa-Token 配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（秒），7天
  timeout: 604800
  # token 最低活跃频率（秒），-1 代表不限制
  active-timeout: -1
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token
  is-share: true
  # token 风格（uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: false
  # 是否从请求体读取 token（支持 URL 参数传递 token）
  is-read-body: true