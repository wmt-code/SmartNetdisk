<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">AI RAG 智能问答流程</text>

  <!-- Step 1 -->
  <rect x="280" y="45" width="240" height="50" rx="25" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="#5B21B6">用户提问</text>

  <line x1="400" y1="95" x2="400" y2="125" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="250" y="130" width="300" height="55" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Embedding API</text>
  <text x="400" y="173" text-anchor="middle" font-size="11" fill="#3B82F6">将问题文本转换为 1024 维向量</text>

  <line x1="400" y1="185" x2="400" y2="215" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="220" y="220" width="360" height="65" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="247" text-anchor="middle" font-size="13" font-weight="600" fill="#065F46">pgvector 余弦相似度搜索</text>
  <text x="400" y="267" text-anchor="middle" font-size="11" fill="#10B981">从已向量化文档中检索 Top-K 最相关的文本块</text>

  <!-- Side note -->
  <rect x="620" y="225" width="150" height="55" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1" filter="url(#s)"/>
  <text x="695" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">知识库模式</text>
  <text x="695" y="265" text-anchor="middle" font-size="10" fill="#EA580C">可限定搜索范围</text>
  <text x="695" y="278" text-anchor="middle" font-size="10" fill="#EA580C">至指定文件</text>
  <line x1="580" y1="252" x2="620" y2="252" stroke="#FDBA74" stroke-width="1" stroke-dasharray="4"/>

  <line x1="400" y1="285" x2="400" y2="315" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="200" y="320" width="400" height="75" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#9D174D">构建 LLM Prompt</text>
  <text x="260" y="370" font-size="11" fill="#EC4899">System: 你是文档助手 + 检索到的文档上下文</text>
  <text x="260" y="385" font-size="11" fill="#EC4899">History: 最近 10 轮对话历史 → User: 用户问题</text>

  <line x1="400" y1="395" x2="400" y2="425" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="250" y="430" width="300" height="55" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="453" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">LLM Chat Completion</text>
  <text x="400" y="473" text-anchor="middle" font-size="11" fill="#8B5CF6">调用大语言模型生成回答（max_tokens: 2000）</text>

  <line x1="400" y1="485" x2="400" y2="515" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 6 -->
  <rect x="220" y="520" width="360" height="50" rx="25" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="543" text-anchor="middle" font-size="13" font-weight="600" fill="#065F46">返回 Markdown 格式回答</text>
  <text x="400" y="560" text-anchor="middle" font-size="11" fill="#10B981">+ 引用来源文件列表 · 持久化到 chat_session</text>
</svg>
