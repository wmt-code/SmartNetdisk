<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">SmartNetdisk — 功能特性矩阵</text>

  <!-- 文件管理 -->
  <rect x="30" y="50" width="260" height="210" rx="14" fill="#fff" stroke="#3B82F6" stroke-width="1.5" filter="url(#s)"/>
  <rect x="30" y="50" width="260" height="38" rx="14" fill="#DBEAFE"/>
  <text x="160" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">📁 文件管理</text>
  <text x="50" y="108" font-size="11" fill="#4B5563">• 拖拽上传 / 文件夹上传</text>
  <text x="50" y="126" font-size="11" fill="#4B5563">• 分片上传 / 秒传 / 断点续传</text>
  <text x="50" y="144" font-size="11" fill="#4B5563">• 批量 ZIP 打包下载</text>
  <text x="50" y="162" font-size="11" fill="#4B5563">• 图片/视频/音频/PDF/Office 预览</text>
  <text x="50" y="180" font-size="11" fill="#4B5563">• 44 种格式在线编辑 (Monaco)</text>
  <text x="50" y="198" font-size="11" fill="#4B5563">• 文件夹递归操作 / 回收站</text>
  <text x="50" y="216" font-size="11" fill="#4B5563">• 列表 / 网格双视图</text>
  <text x="50" y="234" font-size="11" fill="#4B5563">• 文件名 + AI 摘要联合搜索</text>

  <!-- AI 智能 -->
  <rect x="320" y="50" width="260" height="210" rx="14" fill="#fff" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <rect x="320" y="50" width="260" height="38" rx="14" fill="#EDE9FE"/>
  <text x="450" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">🤖 AI 智能</text>
  <text x="340" y="108" font-size="11" fill="#4B5563">• RAG 全局问答（基于全部文件）</text>
  <text x="340" y="126" font-size="11" fill="#4B5563">• 多文档知识库（指定文件范围）</text>
  <text x="340" y="144" font-size="11" fill="#4B5563">• AI 文件摘要 (一键生成)</text>
  <text x="340" y="162" font-size="11" fill="#4B5563">• 文档向量化 (POI/PDFBox)</text>
  <text x="340" y="180" font-size="11" fill="#4B5563">• 上传自动向量化 (≤50KB)</text>
  <text x="340" y="198" font-size="11" fill="#4B5563">• 对话历史持久化 (PostgreSQL)</text>
  <text x="340" y="216" font-size="11" fill="#4B5563">• Markdown 格式回答渲染</text>
  <text x="340" y="234" font-size="11" fill="#4B5563">• 多 AI 服务商适配</text>

  <!-- 分享系统 -->
  <rect x="610" y="50" width="260" height="210" rx="14" fill="#fff" stroke="#10B981" stroke-width="1.5" filter="url(#s)"/>
  <rect x="610" y="50" width="260" height="38" rx="14" fill="#D1FAE5"/>
  <text x="740" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">🔗 分享系统</text>
  <text x="630" y="108" font-size="11" fill="#4B5563">• 单文件 / 文件夹 / 批量分享</text>
  <text x="630" y="126" font-size="11" fill="#4B5563">• 提取码保护</text>
  <text x="630" y="144" font-size="11" fill="#4B5563">• 有效期（1/7/30天/永久）</text>
  <text x="630" y="162" font-size="11" fill="#4B5563">• 访问次数限制</text>
  <text x="630" y="180" font-size="11" fill="#4B5563">• 分享页在线预览</text>
  <text x="630" y="198" font-size="11" fill="#4B5563">• 分享者头像 + 用户名展示</text>
  <text x="630" y="216" font-size="11" fill="#4B5563">• 文件夹浏览 + 子文件下载</text>

  <!-- 用户系统 -->
  <rect x="30" y="290" width="260" height="210" rx="14" fill="#fff" stroke="#F59E0B" stroke-width="1.5" filter="url(#s)"/>
  <rect x="30" y="290" width="260" height="38" rx="14" fill="#FEF3C7"/>
  <text x="160" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">👤 用户系统</text>
  <text x="50" y="348" font-size="11" fill="#4B5563">• Sa-Token 认证 + Redis Session</text>
  <text x="50" y="366" font-size="11" fill="#4B5563">• 个人中心 (头像/密码/信息)</text>
  <text x="50" y="384" font-size="11" fill="#4B5563">• 存储空间仪表盘</text>
  <text x="50" y="402" font-size="11" fill="#4B5563">• 主题切换 (浅色/暗色/系统)</text>
  <text x="50" y="420" font-size="11" fill="#4B5563">• 实时通知 (上传/分享/AI)</text>
  <text x="50" y="438" font-size="11" fill="#4B5563">• 未读徽标 + 30s 轮询</text>
  <text x="50" y="456" font-size="11" fill="#4B5563">• Token 过期自动跳转登录</text>

  <!-- 管理后台 -->
  <rect x="320" y="290" width="260" height="210" rx="14" fill="#fff" stroke="#EC4899" stroke-width="1.5" filter="url(#s)"/>
  <rect x="320" y="290" width="260" height="38" rx="14" fill="#FCE7F3"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#9D174D">⚙️ 管理后台</text>
  <text x="340" y="348" font-size="11" fill="#4B5563">• ECharts 数据概览面板</text>
  <text x="340" y="366" font-size="11" fill="#4B5563">• 上传趋势折线图</text>
  <text x="340" y="384" font-size="11" fill="#4B5563">• 文件类型分布饼图</text>
  <text x="340" y="402" font-size="11" fill="#4B5563">• 用户存储排行柱状图</text>
  <text x="340" y="420" font-size="11" fill="#4B5563">• 用户管理 (启禁/配额/角色)</text>
  <text x="340" y="438" font-size="11" fill="#4B5563">• 全局文件管理 (跨用户)</text>
  <text x="340" y="456" font-size="11" fill="#4B5563">• 多维度筛选 (类型/用户/日期)</text>

  <!-- 前端架构 -->
  <rect x="610" y="290" width="260" height="210" rx="14" fill="#fff" stroke="#6366F1" stroke-width="1.5" filter="url(#s)"/>
  <rect x="610" y="290" width="260" height="38" rx="14" fill="#E0E7FF"/>
  <text x="740" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#3730A3">🎨 前端架构</text>
  <text x="630" y="348" font-size="11" fill="#4B5563">• Vue 3 组合式 API + TypeScript</text>
  <text x="630" y="366" font-size="11" fill="#4B5563">• Composables 逻辑提取</text>
  <text x="630" y="384" font-size="11" fill="#4B5563">• 组件化拆分 (God→Thin)</text>
  <text x="630" y="402" font-size="11" fill="#4B5563">• CSS Variables 设计系统 v2</text>
  <text x="630" y="420" font-size="11" fill="#4B5563">• 亮色/暗色/系统 三主题</text>
  <text x="630" y="438" font-size="11" fill="#4B5563">• 桌面端 + 移动端响应式</text>
  <text x="630" y="456" font-size="11" fill="#4B5563">• 右键菜单边界智能检测</text>
</svg>
