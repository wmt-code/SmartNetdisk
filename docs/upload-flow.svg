<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">文件上传流程</text>

  <!-- Step 1 -->
  <rect x="280" y="45" width="240" height="50" rx="25" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="#5B21B6">用户选择文件</text>

  <line x1="400" y1="95" x2="400" y2="125" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="280" y="130" width="240" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">计算文件 MD5</text>
  <text x="400" y="170" text-anchor="middle" font-size="11" fill="#3B82F6">Web Worker 异步计算</text>

  <line x1="400" y1="180" x2="400" y2="210" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3: Diamond -->
  <polygon points="400,215 510,255 400,295 290,255" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">秒传检测</text>
  <text x="400" y="268" text-anchor="middle" font-size="11" fill="#B45309">MD5 匹配?</text>

  <!-- Yes branch -->
  <line x1="290" y1="255" x2="170" y2="255" stroke="#10B981" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="230" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">是</text>
  <rect x="50" y="230" width="120" height="50" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#s)"/>
  <text x="110" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">秒传完成</text>
  <text x="110" y="268" text-anchor="middle" font-size="10" fill="#10B981">0 秒上传</text>

  <!-- No branch -->
  <line x1="400" y1="295" x2="400" y2="325" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="415" y="315" font-size="11" font-weight="600" fill="#EF4444">否</text>

  <!-- Step 4: Diamond -->
  <polygon points="400,330 500,365 400,400 300,365" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">文件 > 10MB?</text>

  <!-- Small file -->
  <line x1="300" y1="365" x2="180" y2="365" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6">否</text>
  <rect x="60" y="340" width="120" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#s)"/>
  <text x="120" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">普通上传</text>
  <text x="120" y="378" text-anchor="middle" font-size="10" fill="#3B82F6">整文件传输</text>

  <!-- Large file -->
  <line x1="500" y1="365" x2="600" y2="365" stroke="#EC4899" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="550" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#EC4899">是</text>
  <rect x="600" y="335" width="150" height="60" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5" filter="url(#s)"/>
  <text x="675" y="357" text-anchor="middle" font-size="12" font-weight="600" fill="#9D174D">分片上传</text>
  <text x="675" y="373" text-anchor="middle" font-size="10" fill="#EC4899">5MB/片 · 并发 4</text>
  <text x="675" y="387" text-anchor="middle" font-size="10" fill="#EC4899">断点续传支持</text>

  <!-- Merge -->
  <line x1="120" y1="390" x2="120" y2="440" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="675" y1="395" x2="675" y2="440" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="120" y1="440" x2="675" y2="440" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="400" y1="440" x2="400" y2="460" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="250" y="465" width="300" height="55" rx="10" fill="#fff" stroke="#6B7280" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="488" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">存入 MinIO · 更新元数据</text>
  <text x="400" y="506" text-anchor="middle" font-size="11" fill="#6B7280">记录文件信息 · 更新用户空间 · 发送通知</text>

  <line x1="400" y1="520" x2="400" y2="550" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 6: Diamond -->
  <polygon points="400,555 520,590 400,625 280,590" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="587" text-anchor="middle" font-size="12" font-weight="600" fill="#5B21B6">≤50KB 且</text>
  <text x="400" y="603" text-anchor="middle" font-size="12" font-weight="600" fill="#5B21B6">支持向量化?</text>

  <!-- Auto vectorize -->
  <line x1="520" y1="590" x2="620" y2="590" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="570" y="583" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">是</text>
  <rect x="620" y="565" width="140" height="50" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <text x="690" y="587" text-anchor="middle" font-size="12" font-weight="600" fill="#5B21B6">异步向量化</text>
  <text x="690" y="603" text-anchor="middle" font-size="10" fill="#8B5CF6">事务提交后触发</text>

  <!-- Skip -->
  <line x1="280" y1="590" x2="180" y2="590" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="230" y="583" text-anchor="middle" font-size="11" font-weight="600" fill="#6B7280">否</text>
  <rect x="80" y="570" width="100" height="40" rx="20" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="130" y="595" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">完成</text>
</svg>
